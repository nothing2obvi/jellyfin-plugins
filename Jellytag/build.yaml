changelog: |
  ## v1.34.0.0
  - Add configurable cache warmer client profiles for Findroid, Android TV, Roku, and Streamyfin
  - Warm by client profile order first so a preferred client can be completed sooner
  - Allow profiles to be disabled from the JellyTag-Plus configuration page
