version: "1.52.17.0"
targetAbi: "12.0.0.0"
framework: "net10.0"
owner: "nothing2obvi"
overview: "Overlays quality badges (resolution, HDR, codec, audio, language, collections) on media posters and thumbnails."
description: |
  JellyTag-Plus automatically overlays quality badges on your media posters and thumbnails.
  Badges are visible on all clients including web, mobile, TV, and Kodi.

  Features:
  - Per-library badge type controls
  - Resolution, HDR, codec, audio, language, and collection badges
  - Custom collection badge images matched by regex
  - Image caching for performance

category: "General"
artifacts:
