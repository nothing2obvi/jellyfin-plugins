name: "JellyTag-Plus"
guid: "a3db8d87-9a5a-4f35-94b5-7df409f7dc01"
version: "1.50.7.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "nothing2obvi"
overview: "Overlays quality badges (resolution, HDR, codec, audio, language, collections) on media posters and thumbnails."
description: |
  JellyTag-Plus automatically overlays quality badges on your media posters and thumbnails.
  Badges are visible on all clients including web, mobile, TV, and Kodi.

  Features:
  - Per-library badge type controls
  - Resolution, HDR, codec, audio, language, and collection badges
  - Custom collection badge images matched by regex
  - Image caching for performance

category: "General"
artifacts:
  - "Jellyfin.Plugin.JellyTagPlus.dll"
changelog: |
  ## v1.50.7.0
  - Stabilize image cache keys by sorting order-insensitive configuration lists before fingerprinting

  ## v1.50.6.0
  - Store warmer client profile enablement and order in a small sidecar file
  - Restore warmer client profile settings on plugin startup if Jellyfin rehydrates defaults after an update
  - Load warmer client profile settings from the sidecar for the configuration page

  ## v1.50.5.0
  - Keep warmer progress stable when library option ordering changes without changing settings
  - Show existing warmer ledger progress when the current progress scope is empty after a harmless scope mismatch

  ## v1.50.4.0
  - Prevent missing warmer client profile fields from being saved back as default selections
  - Preserve existing warmer client enablement and order by checking raw configuration payload fields

  ## v1.50.3.0
  - Preserve saved warmer client profile enablement and order if a configuration save omits those fields
  - Keep Learned Clients last in the default warmer profile order
  - Sort library settings alphabetically
  - Keep Home & Libraries visible in warmer progress unless a profile has separate Home and Libraries phases

  ## v1.50.2.0
  - Preserve warmer client profile enablement and ordering across profile migrations
  - Expand legacy Moonfin warmer settings into the split Moonfin client profiles
  - Fold ambiguous warmer progress phases into Home, Libraries, or Home & Libraries display labels

  ## v1.50.1.0
  - Fix cache warmer startup when old learned-client phase state is present
  - Sanitize the JellyTag-Plus README image and scale README previews
  - Use JellyTag-Plus consistently in user-facing text

  ## v1.50.0.0
  - Add optional expired-cache validation metadata to avoid unnecessary re-renders
  - Move Findroid unsized warmup into the Home & Libraries phase
  - Split Moonfin warmer profiles by client and add DUNE, Swiftfin, and Jellyfin Desktop fixed client profiles
  - Document variable-size clients and Learned Clients coverage
  - Preserve warmer client profile ordering when configuration is saved

  ## v1.49.0.0
  - Add optional Learned Clients warmer profile based on real Primary/Thumb client image requests
  - Normalize learned image dimensions to the nearest 10 pixels and skip variants already covered by fixed client profiles
  - Add a scheduled task to clear the learned client profile

  ## v1.48.0.0
  - Add request-level cached-image shortcuts so repeated cache hits can skip badge detection after the shortcut is learned
  - Serve cached badge images through file responses instead of manually copying streams

  ## v1.47.1.0
  - Use conservative cache warmer defaults for all-day operation

  ## v1.47.0.0
  - Add JellyTag-Plus warmup result headers so the warmer can distinguish cache hits, newly written cache files, no-badge pass-throughs, and failures
  - Only mark warmer ledger entries complete for confirmed JellyTag-Plus warmup outcomes

  ## v1.46.0.0
  - Move MusicVideo and standalone Video warmup requests into a Videos phase after Episodes

  ## v1.45.0.0
  - Report cache warmer progress from startup, including skipped already-warmed variants
  - Keep warmer task progress alive while waiting for the client quiet window

  ## v1.44.0.0
  - Coalesce concurrent renders for the same uncached image variant
  - Store cache files in hash-prefixed folders with a persistent cache index
  - Reuse rasterized SVG badges and repeated badge position layouts during rendering
  - Prune cache index entries during cache cleanup and clear them when clearing the cache

  ## v1.43.0.0
  - Add Wholphin cache warmer client profile after Streamyfin
  - Allow cache duration 0 for forever and remove the 720-hour maximum
  - Run cache warmer requests by Home, Libraries, Episodes, and Other phases across all enabled clients
